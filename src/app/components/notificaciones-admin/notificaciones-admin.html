<div class="admin-page-container">
    <nav class="admin-navbar">
      <div class="navbar-content">
        <h2 class="admin-brand" (click)="onBack()">PonteGuapa <span class="brand-tag">Admin</span></h2>
        <div class="nav-actions">
          <button class="nav-link-btn" (click)="onBack()">Volver al Panel</button>
          <button class="logout-link" (click)="onLogout()">Cerrar Sesión</button>
        </div>
      </div>
    </nav>
  
    <div class="content-wrapper">
      <header class="header-section">
        <h1 class="page-title">Gestión de Notificaciones</h1>
      </header>
  
      <div class="notif-layout">
        <section class="send-panel">
          <div class="glass-card">
            <h3 class="card-subtitle">Enviar Notificación</h3>
            
            <div class="form-group">
              <label>Destinatarios</label>
              <select [(ngModel)]="destinatarioSeleccionado" class="custom-input">
                <option value="Todos los clientes">Todos los clientes</option>
                <option value="Clientes con citas">Clientes con citas</option>
                <option value="Cliente específico (Individual)">Cliente específico (Individual)</option>
              </select>
            </div>
  
            <div class="form-group" *ngIf="destinatarioSeleccionado === 'Cliente específico (Individual)'">
              <label>Correo del Cliente</label>
              <input type="email" [(ngModel)]="correoEspecifico" placeholder="ejemplo@correo.com" class="custom-input">
            </div>
  
            <div class="form-group">
              <label>Asunto</label>
              <input type="text" [(ngModel)]="asunto" placeholder="Ej: Promoción especial" class="custom-input">
            </div>
  
            <div class="form-group">
              <label>Mensaje</label>
              <textarea [(ngModel)]="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." class="custom-input"></textarea>
            </div>
  
            <button class="submit-btn" (click)="enviarNotificacion()" 
                    [disabled]="!asunto || !mensaje || (destinatarioSeleccionado.includes('Individual') && !correoEspecifico)">
              <span class="icon"></span> Enviar Notificación vía Email
            </button>
          </div>
  
          <div class="reach-info">
            <div class="reach-content">
              <div class="reach-icon">👥</div>
              <div class="reach-text">
                <p class="reach-label">Alcance estimado</p>
                <h2 class="reach-number">156 clientes</h2>
                <p class="reach-sub">Total de clientes registrados en el sistema</p>
              </div>
            </div>
          </div>
        </section>
  
        <section class="history-panel">
          <h3 class="section-title">Notificaciones Recientes</h3>
          <div class="history-scroll">
            <article class="history-item" *ngFor="let item of historial">
              <div class="item-header">
                <h4>{{item.asunto}}</h4>
                <span class="item-date">{{item.fecha | date:'d/M/yyyy'}}</span>
              </div>
              <p class="item-body">{{item.mensaje}}</p>
              <div class="item-footer">
                <span class="target-tag">{{item.destinatarios}}</span>
                <span class="count-tag"><strong>{{item.enviados}}</strong> enviados</span>
              </div>
            </article>
          </div>
        </section>
      </div>
    </div>
  </div>
