<div class="reservar-page">
    <nav class="nav-header">
      <div class="nav-content">
        <h2 class="logo-text" (click)="regresar()">PonteGuapa</h2>
        <div class="nav-actions">
          <button class="nav-btn" (click)="regresar()">Volver al Panel</button>
          <button class="nav-btn logout">Cerrar Sesión</button>
        </div>
      </div>
    </nav>
  
    <div class="content-container">
      <div class="top-actions">
        <h2 class="title">{{ datosEdicion ? 'Modificar Cita' : 'Reservar Cita' }}</h2>
      </div>
  
      <div class="booking-card">
        
        <div class="promo-banner" *ngIf="servicioFijo && esPromo && !datosEdicion">
          <div class="promo-banner-content">
            <span class="promo-tag">🎉 Promoción Especial</span>
            <p class="promo-detail">
              {{ servicioFijo }} - {{ textoPromoActual }} ({{ porcentajePromoActual }} de descuento)
            </p>
          </div>
        </div>
  
        <form (ngSubmit)="confirmarReserva()">
          
          <div class="form-group">
            <label>Servicio</label>
            <select [(ngModel)]="nuevaCita.servicio" name="servicio" [disabled]="servicioFijo !== '' || datosEdicion" required>
              <option value="" disabled selected>Elige un servicio...</option>
              
              <ng-container *ngIf="!servicioFijo && !datosEdicion">
                <option *ngFor="let s of servicios" [value]="s">{{ s }}</option>
              </ng-container>
  
              <option *ngIf="servicioFijo || datosEdicion" [value]="nuevaCita.servicio">{{ nuevaCita.servicio }}</option>
            </select>
          </div>
  
          <div class="form-row">
            <div class="form-group">
              <label>Fecha</label>
              <input 
                type="date" 
                [(ngModel)]="nuevaCita.fecha" 
                [min]="fechaMinima" 
                name="fecha" 
                required>
            </div>
  
            <div class="form-group">
              <label>Hora</label>
              <select [(ngModel)]="nuevaCita.hora" name="hora" required>
                <option value="" disabled selected>Selecciona una hora...</option>
                <option *ngFor="let h of horarios" [value]="h">{{ h }}</option>
              </select>
            </div>
          </div>
  
          <div class="form-group">
            <label>Notas adicionales (opcional)</label>
            <textarea 
              [(ngModel)]="nuevaCita.notas" 
              name="notas" 
              placeholder="¿Alguna preferencia o comentario especial?"
              rows="4"></textarea>
          </div>
  
          <button type="submit" class="btn-confirm">
            {{ datosEdicion ? 'Guardar Cambios' : 'Confirmar Reserva' }}
          </button>
        </form>
      </div>
    </div>
  </div>
