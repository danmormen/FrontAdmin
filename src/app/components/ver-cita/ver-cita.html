<div class="ver-cita-page">
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>
  <div class="bg-circle circle-3"></div>

  <app-client-navbar
    [active]="'ver'"
    (navigate)="onNavigate($event)"
    (logout)="cerrarSesion()">
  </app-client-navbar>

  <div class="content-container">
    <div class="top-header">
      <h1 class="page-title">Mis Citas</h1>
      <p class="page-subtitle">Gestiona tus reservas</p>
    </div>

    <div class="citas-wrapper">
      <div class="cita-card glass-card" *ngFor="let cita of listaCitas">

        <div class="cita-left">
          <div class="status-tag" [ngClass]="cita.estado === 'Confirmada' ? 'tag-green' : 'tag-yellow'">
            {{ cita.estado }}
          </div>
          <h3 class="cita-servicio">{{ cita.servicio }}</h3>
          <div class="cita-meta">
            <div class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              <span>{{ cita.fecha }}</span>
            </div>
            <div class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              <span>{{ cita.hora }}</span>
            </div>
            <div class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <span>{{ cita.estilista }}</span>
            </div>
          </div>
        </div>

        <div class="actions-section">
          <button *ngIf="cita.estado === 'Pendiente'"
                  class="btn-action btn-green"
                  (click)="onConfirmar(cita)">
            Confirmar
          </button>

          <button *ngIf="cita.estado === 'Pendiente'"
                  class="btn-action btn-blush"
                  (click)="onModificar(cita)">
            Modificar
          </button>

          <button class="btn-action btn-outline-red" (click)="onCancelar(cita)">
            Cancelar
          </button>
        </div>

      </div>

      <div class="empty-state" *ngIf="listaCitas.length === 0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        <p>No tienes citas programadas</p>
      </div>
    </div>
  </div>
</div>
