<div class="auth-layout">
    <div class="auth-card">
  
      <div class="brand-header">
        <h2>PonteGuapa</h2>
        <p class="subtitle">Actualización de Seguridad</p>
      </div>
  
      <div class="icon-container">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
  
      <h1 class="card-title">Cambia tu contraseña</h1>
  
      <!-- Mensaje personalizado según el rol del usuario -->
      <p class="instruction-text">{{ getMensajeInstruccion() }}</p>
  
      <!-- Mensaje de error -->
      <div class="error-box" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>
  
      <div class="form-container">
        <div class="input-field">
          <label>Nueva Contraseña</label>
          <input type="password" [(ngModel)]="nuevaPassword"
            placeholder="Mínimo 6 caracteres" minlength="6">
        </div>
  
        <div class="input-field">
          <label>Confirmar Nueva Contraseña</label>
          <input type="password" [(ngModel)]="confirmarPassword"
            placeholder="Repite la contraseña">
        </div>
  
        <button class="primary-btn" (click)="guardarPassword()">
          Guardar y Continuar
        </button>
  
        <button class="text-btn" (click)="cancelar()">
          Cancelar y volver al inicio
        </button>
      </div>
  
    </div>
  </div>
