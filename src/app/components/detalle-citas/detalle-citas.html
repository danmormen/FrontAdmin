<div class="detalle-container">
  <app-estilista-navbar
    [active]="'detalle'"
    (navigate)="onNavigate($event)"
    (logout)="onLogout()">
  </app-estilista-navbar>

  <main class="main-layout">
    <header class="page-info">
      <h1>Mis Citas de Hoy</h1>
      <p class="day-subtitle">{{ fechaHoy }}</p>
    </header>

    <!-- Progreso del día -->
    <div class="progress-bar-card">
      <div class="progress-labels">
        <span>Progreso del día</span>
        <span class="progress-count">{{ completadas }} / {{ total }} completadas</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" [style.width.%]="(completadas / total) * 100"></div>
      </div>
    </div>

    <!-- Lista de citas de hoy -->
    <div class="cards-stack">
      <article class="appointment-item" *ngFor="let cita of citasHoy"
               [class.is-completada]="cita.estado === 'Completada'">

        <!-- Franja de hora -->
        <div class="time-stripe">
          <span class="time-value">{{ cita.hora }}</span>
          <span class="time-label">hora</span>
        </div>

        <!-- Cuerpo -->
        <div class="appt-body">

          <!-- Servicio + estado -->
          <div class="appt-top-row">
            <span class="appt-service-name">{{ cita.servicio }}</span>
            <span class="status-pill" [ngClass]="cita.estado.toLowerCase()">{{ cita.estado }}</span>
          </div>

          <!-- Duración -->
          <div class="appt-meta-row">
            <span class="meta-label">Duración</span>
            <span class="duration-chip">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
              </svg>
              {{ cita.duracion }}
            </span>
          </div>

          <div class="appt-divider"></div>

          <!-- Cliente + acción -->
          <div class="appt-bottom-row">
            <div class="client-block">
              <div class="client-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </div>
              <div>
                <p class="client-name">{{ cita.cliente }}</p>
                <p class="client-phone">{{ cita.telefono }}</p>
              </div>
            </div>

            <div class="appt-actions">
              <button
                *ngIf="cita.estado !== 'Completada'"
                class="complete-btn"
                (click)="marcarCompletada(cita.id)">
                Marcar completada
              </button>
              <span *ngIf="cita.estado === 'Completada'" class="finished-tag">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                Finalizada
              </span>
            </div>
          </div>

          <!-- Notas -->
          <div class="notes-box" *ngIf="cita.notas">
            <p>{{ cita.notas }}</p>
          </div>

        </div>
      </article>
    </div>
  </main>
</div>
