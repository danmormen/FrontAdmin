<div class="auth-layout">
    <div class="auth-card">
  
      <div class="brand-header">
        <h2>PonteGuapa</h2>
        <p class="subtitle">Recuperación de Cuenta</p>
      </div>
  
      <div class="icon-container">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
        </svg>
      </div>
  
      <h1 class="card-title">Recupera tu acceso</h1>
  
      <!-- Formulario — se oculta después de enviar -->
      <div *ngIf="!successMsg">
        <p class="instruction-text">
          Ingresa tu correo electrónico y te enviaremos una contraseña temporal
          para que puedas ingresar a tu cuenta.
        </p>
  
        <div class="error-box" *ngIf="errorMsg">{{ errorMsg }}</div>
  
        <div class="form-container">
          <div class="input-field">
            <label>Correo Electrónico</label>
            <input type="email" [(ngModel)]="email" placeholder="ejemplo@correo.com">
          </div>
  
          <button class="primary-btn" (click)="enviarPasswordTemporal()" [disabled]="cargando">
            {{ cargando ? 'Enviando...' : 'Enviar contraseña temporal' }}
          </button>
  
          <button class="text-btn" (click)="cancelar()">Cancelar y volver al Login</button>
        </div>
      </div>
  
      <!-- Mensaje de éxito con cuenta regresiva -->
      <div *ngIf="successMsg" style="text-align: center;">
        <div class="success-box">{{ successMsg }}</div>
  
        <p style="color: #888; margin-top: 12px; font-size: 14px;">
          Redirigiendo al login en <strong>{{ contador }}</strong> segundos...
        </p>
  
        <button class="primary-btn" (click)="cancelar()" style="margin-top: 16px;">
          Ir al Login ahora
        </button>
      </div>
  
    </div>
  </div>
